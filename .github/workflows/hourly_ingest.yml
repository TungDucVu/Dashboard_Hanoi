name: Hourly Real-Time Data Ingestion & Pages Deployment

on:
  schedule:
    - cron: '0 * * * *' # Executes at the start of every hour
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - main # Deploys updates to index.html/data immediately on push

# Permissions needed for GITHUB_TOKEN to push commits and deploy pages
permissions:
  contents: write
  pages: write
  id-token: write

# Avoid concurrent deployments of the Pages site
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Real-Time Data
        env:
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
        run: python ingest_realtime.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/realtime_metrics.json
          git diff-index --quiet HEAD || git commit -m "chore: hourly real-time data update"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

